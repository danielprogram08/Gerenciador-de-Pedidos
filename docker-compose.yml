services:
  app-frontend:
    build:
      context: ./FRONT/gerenciador
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - app-backend
    networks:
      - network-application

  app-backend:
    build:
      context: ./BACK/main
    ports:
      - "8080:8080"
    environment:
      - SPRING_JWT_SECRET=my-secret-key
      - SPRING_DATABASE_URL=jdbc:mysql://db:3306/PedidosDB
      - SPRING_DATABASE_USERNAME=admin
      - SPRING_DATABASE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_PROFILES_ACTIVE=homolog
      - URL_FRONT=http://localhost:5173
    depends_on:
      - db
    networks:
      - network-application

  db:
    image: mysql:latest
    container_name: mysql-db
    ports:
      - "3306:3306"
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=admin
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=admin
      - MYSQL_DATABASE=PedidosDB
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - network-application

networks:
  network-application:
    driver: bridge

volumes:
  db_data:
