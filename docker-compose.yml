services:
  pihole:
    container_name: pihole
    # Adiciona "Linux Capabilities" ao contêiner. O Pi-hole precisa de permissões elevadas 
    # para modificar configurações de rede e otimizar seu desempenho.
    # - NET_ADMIN: Necessário para funcionalidades de rede avançadas (como o servidor DHCP do Pi-hole).
    # - SYS_TIME: Permite que o contêiner sincronize o tempo do sistema.
    # - SYS_NICE: Permite que o processo do Pi-hole tenha prioridade de processamento.
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    restart: unless-stopped
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # Porta 80 para a interface web de administração do Pi-hole (HTTP).
      - "80:80/tcp"
      # Porta 443 para a interface web de administração do Pi-hole (HTTPS).
      - "443:443/tcp"
    environment:
      # Define o fuso horário para logs e agendamentos corretos.
      TZ: 'Europe/London'
      # Configura o DNS do Pi-hole para escutar em todas as interfaces de rede dentro do contêiner.
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - './etc-pihole:/etc/pihole'
    networks:
      - network-application

  app-frontend:
    build:
      context: ./FRONT/gerenciador
      args:
        VITE_API_URL: http://192.168.18.134:8080
    container_name: react-app
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - app-backend
    networks:
      - network-application

  app-backend:
    build:
      context: ./BACK/main
    container_name: spring-boot-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: my-secret-key
      SPRING_PROFILES_ACTIVE: homolog
    depends_on:
      - db
    networks:
      - network-application

  db:
    image: mysql:latest
    container_name: mysql-db
    ports:
      - "3306:3306"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: PedidosDB
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - network-application

networks:
  network-application:
    driver: bridge

volumes:
  db_data:
